<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            border: 1px solid black;
            padding: 15px;
            width: 200px;
            background-color: lightgray;
        }

        #name {
            color: blue;
            font-weight: bold;
        }

        .desc {
            color: gray;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="name">More</h2>
        <p class="desc">Navy</p>
        <p style="color: red;">Inline styled text</p>
    </div>
</body>
</html>
