<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .box{
            width: 200px;
            padding: 20px;
            border: 5px solid black;
            margin: 10px;
        }
        #contentBox {
            box-sizing: content-box;
            background: brown;
        }
        #borderBox{
            box-sizing: border-box;
            background: lightgreen;
        }
    </style>
</head>
<body>
    <div id="contentBox" class="box">content-box</div>
    <div id="borderBox" class="box">border-box</div>
</body>
</html>
