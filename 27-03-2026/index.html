<!DOCTYPE html>
<html>
<head>
<style>
#container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.box {
  background: teal;
  color: white;
  padding: 20px;
  text-align: center;
}
@media (max-width: 800px) {
  #container {
    grid-template-columns: repeat(2, 1fr);
  }
}
@media (max-width: 500px) {
  #container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div id="container">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>
</body>
</html>
