<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>
    <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: darkblue;
            text-align: center;
        }

        p {
            color: black;
            font-size: 18px;
        }

        .box {
            width: 200px;
            height: 100px;
            background-color: orange;
            border: 2px solid black;
            margin: 20px auto;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>
<body>

    <h1>My First CSS Program</h1>
    <p>This is a paragraph styled using CSS.</p>

    <div class="box">
        Box
    </div>

</body>
</html>
