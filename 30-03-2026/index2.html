<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Practice </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }
        .navbar{
            display: flex;
            justify-content: space-between;
            background: #de9b9b;
            padding: 15px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }
        .header{
            text-align: center;
            padding: 40px;
            color: #fff;
        }
        .btn {
           padding: 10px 20px;
           border: none;
           background: #ff7a18;
           color: white;
           cursor: pointer;
           transition: 0.3s;
        }
        .btn:hover {
           background: #000;
           transform: scale(1.1);
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>Logo</div>
        <div>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>
    
    <div class="header animate">
    <h1>CSS Practice Page</h1>
    <p>Learn all CSS concepts in one file</p>
    <button class="btn">Click Me</button>
    </div>

    <div class="grid">
    <div class="card">
    <img src="https://picsum.photos/200" alt="">
    <h3>Card 1</h3>
    <p>This is a sample card.</p>
  </div>
</body>
</html>
