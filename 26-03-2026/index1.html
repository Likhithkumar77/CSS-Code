<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* GRID CONTAINER */
.container {
    display: grid;
    grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
    grid-template-columns: 1fr 3fr;
    gap: 10px;
    padding: 10px;
}

/* COMMON STYLE */
.box {
    padding: 20px;
    color: white;
}

/* SECTIONS */
.header {
    grid-area: header;
    background: #222;
    text-align: center;
}

.sidebar {
    grid-area: sidebar;
    background: #444;
}

.main {
    grid-area: main;
    background: #666;
}

.footer {
    grid-area: footer;
    background: #111;
    text-align: center;
}

/* PROJECT GRID INSIDE MAIN */
.projects {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.project {
    background: #888;
    padding: 20px;
    text-align: center;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .container {
        grid-template-areas:
            "header"
            "main"
            "sidebar"
            "footer";
        grid-template-columns: 1fr;
    }

    .projects {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="box header">
        <h1>My Portfolio</h1>
        <p>Web Developer</p>
    </div>

    <div class="box sidebar">
        <h2>About Me</h2>
        <p>I am learning web development.</p>

        <h3>Skills</h3>
        <ul>
            <li>HTML</li>
            <li>CSS Grid</li>
            <li>JavaScript</li>
        </ul>
    </div>

    <div class="box main">
        <h2>My Projects</h2>

        <div class="projects">
            <div class="project">Project 1</div>
            <div class="project">Project 2</div>
            <div class="project">Project 3</div>
        </div>
    </div>

    <div class="box footer">
        <p>© 2026 My Portfolio</p>
    </div>

</div>
     
</body>
</html>
