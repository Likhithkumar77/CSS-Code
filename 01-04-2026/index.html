<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <style>
        * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
           }

        body {
            background: #111;
            color: white;
            font-family: Arial;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            position: fixed;
            width: 100%;
            z-index: 10;
        }
        .logo {
            color: red;
            font-size: 24px;
            font-weight: bold;
        }
        .hero {
            height: 50vh;
            background: url("https://picsum.photos/1200/600") center/cover no-repeat;
            position: relative;
        }
        .hero::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }
        .hero-content {
            position: absolute;
            bottom: 50px;
            left: 30px;
            z-index: 1;
        }
        .btn {
            padding: 10px 20px;
            background: red;
            border: none;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }
        .row {
            margin: 20px;
        }
        .row h2 {
            margin-bottom: 10px;
        }
        .row-posters {
            display: flex;
            overflow-x: scroll;
        }
        .row-posters img {
            width: 150px;
            margin-right: 10px;
            transition: 0.3s;
            border-radius: 5px;
        }
        .row-posters img:hover {
            transform: scale(1.2);
        }
        .row-posters::-webkit-scrollbar {
            display: none;
        }
        @media(max-width:768px) {
            .hero {
            height: 60vh;
        }
        .row-posters img {
            width: 100px;
        }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">NETFLIX</div>
        <div>User</div>
    </div>
    <div class="hero">
        <div class="hero-content">
           <h1>Movie Title</h1>
           <p>Watch now. Unlimited movies and shows.</p>
           <button class="btn">Play</button>
        </div>
    </div>
    <div class="row">
        <h2>Trending Now</h2>
        <div class="row-posters">
            <img src="https://picsum.photos/200/300?1">
            <img src="https://picsum.photos/200/300?2">
        </div>
    </div>
    <div class="row">
    <h2>Top Rated</h2>
    <div class="row-posters">
        <img src="https://picsum.photos/200/300?6">
        <img src="https://picsum.photos/200/300?7">
    </div>
    </div>
</body>
</html>
